<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STUDYPILOT • Student OS</title>
<style>
:root {
  --bg: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
  --glass: rgba(255,255,255,0.92);
  --glass-border: rgba(255,255,255,0.98);
  --text: #0f172a;
  --muted: #64748b;
  --accent: #3b82f6;
  --red: #ef4444;
  --radius: 22px;
}
body.dark {
  --bg: linear-gradient(135deg, #1e2937 0%, #0f172a 100%);
  --glass: rgba(15,23,42,0.95);
  --glass-border: rgba(148,163,184,0.35);
  --text: #f1f5f9;
  --muted: #94a3b8;
}

* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.app-shell { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

.sidebar {
  background: var(--glass);
  backdrop-filter: blur(32px);
  border-right: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
}

.glass-panel, .audio-glass {
  background: var(--glass);
  backdrop-filter: blur(32px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 28px;
  box-shadow: 0 10px 30px -10px rgba(0,0,0,0.12);
  animation: fadeInUp 0.6s ease forwards;
}

.audio-glass { backdrop-filter: blur(40px); padding: 26px; }

.timer-face {
  font-size: 6.2rem;
  font-weight: 800;
  letter-spacing: 10px;
  text-align: center;
  padding: 52px 20px;
  background: rgba(255,255,255,0.45);
  border: 5px solid var(--accent);
  border-radius: 28px;
  animation: pulse 6s infinite ease-in-out;
}

body.dark .timer-face { background: rgba(15,23,42,0.8); }

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.4); }
  50% { box-shadow: 0 0 0 35px rgba(59,130,246,0); }
}

.tab-btn {
  width: 100%;
  padding: 16px 28px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  border-radius: 14px;
  margin: 4px 12px;
  transition: all 0.3s ease;
}
.tab-btn.active, .tab-btn:hover {
  background: rgba(59,130,246,0.15);
  color: var(--accent);
  transform: translateX(8px);
}

.btn-primary {
  background: linear-gradient(135deg, #2563eb, #3b82f6);
  color: white;
  border: none;
  padding: 13px 28px;
  border-radius: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}
.btn-primary:hover {
  transform: translateY(-4px);
  box-shadow: 0 15px 30px rgba(59,130,246,0.4);
}
</style>
</head>
<body>
